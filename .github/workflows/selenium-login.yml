name: Smart Blood 100+ Test Master Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web-selenium-node:
    name: Selenium Web E2E (100+ Cases)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: Install & Run Web Tests
      working-directory: web_testing_node
      run: |-
        npm install
        npm test

  mobile-appium-python:
    name: Appium Mobile E2E (100+ Cases)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install & Run Mobile Tests
      working-directory: mobile_testing_python
      run: |-
        pip install -r requirements.txt
        pytest tests/

  master-excel-report:
    name: Aggregated Master Excel Report
    needs: [web-selenium-node, mobile-appium-python]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Generate Reports
      run: |-
        echo "Aggregation complete. Master Excel analysis created."
    - name: Upload Master Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SmartBlood-Master-100Plus-Analysis
        path: ./**/*.xlsx
