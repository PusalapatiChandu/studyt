name: Smart Blood E2E + Excel Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium-web-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: |-
        cd frontend-app && npm install
        cd ../selenium_tests && npm install
    - name: Run Web Automation
      run: |-
        cd frontend-app && npm run dev &
        sleep 5
        cd selenium_tests && npm test

  appium-mobile-tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: cd appium_tests && npm install
    - name: Run Mobile Automation (Dry-Run)
      run: cd appium_tests && npm test

  excel-analysis-report:
    name: Generate Excel Analysis Report
    needs: [selenium-web-tests, appium-mobile-tests]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install Report dependencies
      run: npm install exceljs
    - name: Generate Unified Analysis Excel
      run: node scripts/excel_reporter.js
    - name: Archive Excel Reports
      uses: actions/upload-artifact@v3
      with:
        name: SmartBlood-E2E-Analysis
        path: ./reports/*.xlsx
